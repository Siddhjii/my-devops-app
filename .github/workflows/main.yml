name: Ultimate DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-scan-deploy-notify:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: 🧪 Code Quality & Structure Test
      run: |
        if [ -f "index.html" ]; then
          echo "✅ HTML file is present. Test Passed!"
        else
          echo "❌ index.html is missing!" && exit 1
        fi

    - name: 🐳 Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-devops-app:latest .

    - name: 🛡️ Security Vulnerability Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/my-devops-app:latest'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🚀 Push Secure Image to Docker Hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/my-devops-app:latest

    - name: 📱 Send Telegram Alert on Success
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🎉 Major Project Update!
          ✅ Code Passed Security Scan!
          🐳 Docker Image Built & Pushed!
          🚀 Ready for Deployment on Render.
