button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
textarea{resize:vertical;}
.ring-container{position:relative;flex-shrink:0;}

.sticky-header{position:sticky;top:0;z-index:40;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.tab-btn{flex:1;padding:8px 4px;border-radius:11px;border:none;font-size:clamp(9px,1.5vw,12px);font-weight:700;transition:all .2s;}
.day-grid-btn{width:30px;height:30px;border-radius:7px;border:none;font-weight:700;font-size:10px;transition:all .15s;}
@media(max-width:480px){.tab-label-long{display:none;}.tab-label-short{display:inline;}}
@media(min-width:481px){.tab-label-short{display:none;}}
.progress-bar-inner{height:100%;border-radius:99px;transition:width .6s;}
.opt-btn{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border-radius:9px;font-weight:600;font-size:12px;text-align:left;transition:all .15s;width:100%;}

function getContentForDay(day, topics) {
  if (DAY_CONTENT[day]) return DAY_CONTENT[day];
  const isRevision = topics.some(t => t.includes("⭐"));
  if (isRevision) {
    return {
      overview: "यह Revision Day है। आज तक पढ़े गए सभी topics को दोबारा review करो। अपनी notes देखो, weak areas identify करो। Mock tests दो और time management practice करो।",
      keyPoints: ["Previous topics का quick review करो","Notes से important formulas और facts याद करो","Practice MCQs solve करो","Weak areas पर extra focus दो","Mind maps बनाओ","Exam pattern के according practice करो"],
      examTip: "⭐ Revision में जल्दी न करो। Quality over quantity। हर topic का एक page summary बनाओ।",
      pyqs: generateRevisionPYQs()
    };
  }
  return {
    overview: `${topics.join(", ")} — Computer Anudeshak Exam का महत्वपूर्ण topic। इस topic से exam में 2-4 questions आते हैं। Theory के साथ-साथ practical examples समझो और definitions याद करो।`,

      `${topics[0]} की basic definition और concepts समझो`,
      "Types और classification याद करो",
      "Applications और real-world examples note करो",
      "Advantages और Disadvantages याद करो",
      "Related terminology और keywords highlight करो",
      "Previous year questions practice करो"

    examTip: `⭐ ${topics[0]} topic से direct definition-based questions आते हैं। Technical terms की exact spelling और full forms याद रखो।`,
    pyqs: generateTopicPYQs(topics)
  };
}

function getTheme() {
  const dark = state.dark;
  return {
    C: dark ? "#fff" : "#111827",
    CSUB: dark ? "rgba(255,255,255,0.5)" : "#6b7280",
    CARD: dark ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.88)",
    BDR: dark ? "1px solid rgba(255,255,255,0.1)" : "1px solid rgba(0,0,0,0.08)",
    INBG: dark ? "rgba(255,255,255,0.08)" : "#fff",
    BG: dark ? "linear-gradient(135deg,#0f0c29 0%,#1a1040 50%,#16213e 100%)" : "linear-gradient(135deg,#e0e7ff,#f0fdf4,#fef3c7)",
  };
}

function getAllDays() {
  return state.syllabus.flatMap(s => s.days);
}

function isDone(day) {
  const d = getAllDays().find(x => x.day === day);
  return d && d.topics.every((_, i) => state.progress[`${day}-${i}`]);
}

function getStats() {
  const allDays = getAllDays();
  const totalDays = allDays.length;
  const totalTopics = allDays.reduce((a, d) => a + d.topics.length, 0);
  const completedDays = allDays.filter(d => isDone(d.day)).length;
  const completedTopics = Object.values(state.progress).filter(Boolean).length;
  const overallPct = totalDays > 0 ? Math.round((completedDays / totalDays) * 100) : 0;
  const topicPct = totalTopics > 0 ? Math.round((completedTopics / totalTopics) * 100) : 0;

  const sorted = [...allDays].sort((a, b) => a.day - b.day);
  let longest = 0, cur = 0;
  sorted.forEach(d => { if (isDone(d.day)) { cur++; longest = Math.max(longest, cur); } else cur = 0; });
  cur = 0;
  for (let i = sorted.length - 1; i >= 0; i--) { if (isDone(sorted[i].day)) cur++; else break; }
  const streak = cur;

  return { totalDays, totalTopics, completedDays, completedTopics, overallPct, topicPct, streak, longest };
}

function getNextDay() {
  const all = state.syllabus.flatMap(s => s.days.map(d => d.day));
  return all.length > 0 ? Math.max(...all) + 1 : 1;
}

function toggleTopic(day, ti) {
  const key = `${day}-${ti}`;
  const newProg = {...state.progress, [key]: !state.progress[key]};
  state.progress = newProg;
  const d = getAllDays().find(x => x.day === day);
  if (d && d.topics.every((_, i) => newProg[`${day}-${i}`]) && !d.topics.every((_, i) => state.progress[`${day}-${i}`])) {
    showCelebration(day);
  }
  render();
}

function showCelebration(day) {
  const el = document.getElementById('celebrationOverlay');
  const T = getTheme();
  el.style.display = 'flex';
  el.innerHTML = `<div style="background:${T.CARD};backdrop-filter:blur(24px);border:${T.BDR};border-radius:24px;padding:32px 48px;text-align:center;">
    <div style="font-size:52px;margin-bottom:8px;">🎉</div>
    <div style="font-size:24px;font-weight:800;color:${T.C};">Day ${day} Complete!</div>
  </div>`;
  startConfetti();
  setTimeout(() => { el.style.display = 'none'; stopConfetti(); }, 3000);
}

// ════ CONFETTI ════
let confettiRAF = null;
function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pts = Array.from({length:100},()=>({x:Math.random()*canvas.width,y:Math.random()*-canvas.height,r:Math.random()*6+2,d:Math.random()*100,color:`hsl(${Math.random()*360},80%,60%)`,ta:0,ts:Math.random()*.1+.04}));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{p.ta+=p.ts;p.y+=(Math.cos(p.d)+2+p.r/2)*1.4;const t=Math.sin(p.ta)*12;ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.color;ctx.moveTo(p.x+t,p.y);ctx.lineTo(p.x+t,p.y+p.r*2);ctx.stroke();if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}});
    confettiRAF=requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti() {
  if(confettiRAF) cancelAnimationFrame(confettiRAF);
  document.getElementById('confettiCanvas').style.display='none';
}

// ════ RING SVG ════
function ringHTML(value, size=100, stroke=9, color="#6366F1", sub='', C='#fff') {
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(value/100)*circ;
  return `<div class="ring-container" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg);">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s ease;"/>
    </svg>
    <div class="ring-text"><span style="font-weight:800;font-size:${size>90?18:13}px;color:${C};">${value}%</span>${sub?`<span style="font-size:9px;opacity:.5;margin-top:1px;color:${C};">${sub}</span>`:''}</div>
  </div>`;
}

// RENDER FUNCTIONS

function render() {
  const T = getTheme();
  document.body.style.background = T.BG;
  document.body.style.color = T.C;

  if (!state.user) {
    document.getElementById('app').innerHTML = renderLogin(T);
    attachLoginEvents();
    return;
  }
  document.getElementById('app').innerHTML = renderMain(T);
  attachMainEvents();
}

function attachLoginEvents() {
  ['loginEmail','loginPass','loginName'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
  });
}

window.setLoginMode = function(m) { state._loginMode=m; render(); };
window.setAvatar = function(id) { state._selAvatar=id; render(); };
window.togglePassVis = function() {
  const p = document.getElementById('loginPass');
  if(p) p.type = p.type==='password'?'text':'password';
};
window.handleLogin = function() {
  const T = getTheme();
  const mode = state._loginMode || 'login';
  const email = (document.getElementById('loginEmail')||{}).value||'';
  const pass = (document.getElementById('loginPass')||{}).value||'';
  const name = (document.getElementById('loginName')||{}).value||'';
  const errEl = document.getElementById('loginErr');
  const showErr = msg => { errEl.style.display='block'; errEl.textContent='⚠️ '+msg; };
  if (!email.trim()||!pass.trim()) { showErr('Email और Password ज़रूरी हैं।'); return; }
  if (mode==='signup'&&!name.trim()) { showErr('नाम ज़रूरी है।'); return; }
  if (pass.length<4) { showErr('Password कम से कम 4 characters।'); return; }
  state.user = { name: name||email.split('@')[0], email, joined: new Date().toLocaleDateString('en-IN'), avatarId: state._selAvatar||DOODLE_AVATARS[0].id };
  state.tab = 'dashboard';
  render();
};

function renderTabContent(T, stats, sorted, todayQ) {
  switch(state.tab) {
    case 'dashboard': return renderDashboard(T, stats, sorted);
    case 'syllabus': return renderSyllabus(T, stats);
    case 'rajgk': return renderRajGK(T);
    case 'notes': return renderNotes(T);
    case 'progress': return renderProgress(T, stats);
    case 'profile': return renderProfile(T, stats);
    default: return '';
  }
}

      ${[{label:'Day Progress',pct:stats.overallPct,color:'#6366F1',done:stats.completedDays,total:stats.totalDays},{label:'Topic Progress',pct:stats.topicPct,color:'#22C55E',done:stats.completedTopics,total:stats.totalTopics}].map(item=>`
        <div style="background:${T.CARD};border:${T.BDR};border-radius:16px;padding:16px 12px;display:flex;align-items:center;gap:12px;">
          ${ringHTML(item.pct, 100, 9, item.color, '', T.C)}

function renderSyllabus(T) {
  const filteredSyl = state.search.trim()
    ? state.syllabus.map(s=>({...s,days:s.days.map(d=>({...d,topics:d.topics.filter(t=>t.toLowerCase().includes(state.search.toLowerCase()))})).filter(d=>d.topics.length>0)})).filter(s=>s.days.length>0)

  return `
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">

      ${state.syllabus.map((s,i)=>`<button onclick="setActiveSub(${i})" style="padding:6px 10px;border-radius:11px;font-weight:700;font-size:13px;border:${state.activeSub===i&&!state.search?`2px solid ${s.color}`:T.BDR};background:${state.activeSub===i&&!state.search?s.color+'22':'transparent'};color:${state.activeSub===i&&!state.search?s.color:T.CSUB};">${s.emoji}</button>`).join('')}
    </div>
    <button onclick="showAddSubjectModal()" style="width:100%;padding:12px 0;border-radius:13px;border:2px dashed rgba(99,102,241,0.5);background:rgba(99,102,241,0.07);color:#818CF8;font-weight:800;font-size:13px;margin-bottom:18px;">➕ नया Subject / Phase जोड़ें</button>

        <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;">

          <button onclick="showAddDayModal('${subj.id}')" style="margin-left:auto;padding:5px 12px;border-radius:9px;border:1px solid ${col}50;background:${col}15;color:${col};font-weight:700;font-size:11px;">+ Day Add</button>
        </div>
        ${subj.days.length===0?`<div style="background:${T.CARD};border:2px dashed ${col}40;border-radius:13px;padding:16px;text-align:center;color:${T.CSUB};font-size:13px;margin-bottom:8px;">कोई day नहीं। "+ Day Add" करो।</div>`:''}
        ${[...subj.days].sort((a,b)=>a.day-b.day).map(d=>{
          const done=isDone(d.day);
          const dc=d.topics.filter((_,i)=>state.progress[`${d.day}-${i}`]).length;
          const expKey=`${subj.id}_${d.day}`;

          const hasNotes=!!(state.dayContent[expKey]?.trim());
          const isRev=d.topics.some(t=>t.includes('⭐'));
          const content=getContentForDay(d.day,d.topics);
          return `<div style="background:${T.CARD};border:${done?`2px solid ${col}55`:isRev?'1.5px solid rgba(245,158,11,0.4)':T.BDR};border-radius:14px;padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:30px;height:30px;border-radius:8px;background:${isRev?'#F59E0B':col};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;">${isRev?'⭐':d.day}</div>
                <div>
                  <div style="font-weight:700;font-size:13px;color:${T.C};">Day ${d.day}${isRev?' — Revision':''}</div>
                  <div style="font-size:11px;color:${T.CSUB};">${dc}/${d.topics.length} done</div>
                </div>
              </div>
              <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;">
                ${done?'<span style="font-size:13px;">✅</span>':''}
                <button onclick="showNotesModal('${subj.id}',${d.day})" style="padding:4px 9px;border-radius:8px;border:1px solid ${col}40;background:${hasNotes?col+'20':'transparent'};color:${hasNotes?col:T.CSUB};font-weight:700;font-size:11px;">${hasNotes?'📝 Notes':'➕ Notes'}</button>
                <button onclick="toggleExpand('${expKey}')" style="padding:4px 10px;border-radius:8px;border:1px solid ${col}50;background:${expanded?col:col+'15'};color:${expanded?'#fff':col};font-weight:700;font-size:11px;">${expanded?'▲ Close':'📖 Study'}</button>
              </div>
            </div>
            <div style="height:3px;border-radius:99px;background:rgba(255,255,255,0.08);margin-bottom:10px;">
              <div class="progress-bar-inner" style="background:${isRev?'#F59E0B':col};width:${d.topics.length>0?(dc/d.topics.length)*100:0}%;"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:7px;">
              ${d.topics.map((topic,ti)=>{
                const checked=!!state.progress[`${d.day}-${ti}`];
                return `<button onclick="doToggleTopic(${d.day},${ti})" style="display:flex;align-items:flex-start;gap:9px;background:none;border:none;cursor:pointer;text-align:left;padding:0;">
                  <div style="width:19px;height:19px;border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:${checked?'#22C55E':'transparent'};border:${checked?'2px solid #22C55E':`2px solid ${state.dark?'rgba(255,255,255,0.28)':'rgba(0,0,0,0.2)'}`};transition:all .2s;">
                    ${checked?'<span style="color:#fff;font-size:10px;font-weight:800;">✓</span>':''}
                  </div>
                  <span style="font-size:13px;line-height:1.45;color:${T.C};text-decoration:${checked?'line-through':'none'};opacity:${checked?.4:1};">${topic}</span>
                </button>`;
              }).join('')}
            </div>
            ${expanded?`<div style="margin-top:12px;border-top:${T.BDR};padding-top:12px;">
              ${hasNotes?`<div style="background:${state.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)'};border-radius:11px;padding:11px 13px;margin-bottom:12px;">
                <div style="font-size:12px;font-weight:700;color:${col};margin-bottom:5px;">📝 My Notes</div>
                <div style="font-size:13px;color:${T.C};line-height:1.75;white-space:pre-wrap;">${state.dayContent[expKey]}</div>
              </div>`:''}
              ${renderStudyPanel(d.day, d.topics, col, T, expKey)}
            </div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}`;
}

function renderStudyPanel(day, topics, color, T, expKey) {
  const panelState = state.studyPanels[expKey] || {tab:'overview', ans:{}, submitted:false, score:0};
  const content = getContentForDay(day, topics);
  return `
    <div>
      <div style="display:flex;gap:5px;margin-bottom:12px;padding:4px;border-radius:12px;background:${state.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.04)'};">
        ${[['overview','📖 Overview'],['pyqs','📝 20 MCQs']].map(([t,l])=>`<button onclick="setPanelTab('${expKey}','${t}')" style="flex:1;padding:7px 0;border-radius:9px;border:none;font-weight:700;font-size:12px;background:${panelState.tab===t?color:'transparent'};color:${panelState.tab===t?'#fff':T.CSUB};">${l}</button>`).join('')}
      </div>
      ${panelState.tab==='overview'?`
        <div style="background:${color}15;border:1px solid ${color}30;border-radius:12px;padding:14px;margin-bottom:12px;">
          <div style="font-weight:800;font-size:13px;color:${color};margin-bottom:6px;">📋 Overview</div>
          <div style="font-size:13px;color:${T.C};line-height:1.75;">${content.overview}</div>
        </div>
        <div style="background:${state.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)'};border-radius:12px;padding:14px;margin-bottom:12px;">
          <div style="font-weight:800;font-size:13px;color:${color};margin-bottom:8px;">🔑 Key Points</div>
          ${content.keyPoints.map(kp=>`<div style="display:flex;gap:8px;margin-bottom:6px;"><span style="color:${color};font-weight:800;flex-shrink:0;">→</span><span style="font-size:13px;color:${T.C};">${kp}</span></div>`).join('')}
        </div>
        <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:12px;">
          <span style="font-weight:700;font-size:12px;color:#F59E0B;">🎯 Exam Tip: </span>
          <span style="font-size:12px;color:${T.C};">${content.examTip}</span>
        </div>`
      :`
        ${panelState.submitted?`
          <div style="background:${panelState.score>=14?'rgba(34,197,94,.15)':panelState.score>=10?'rgba(245,158,11,.15)':'rgba(239,68,68,.15)'};border:1px solid ${panelState.score>=14?'#22C55E':panelState.score>=10?'#F59E0B':'#EF4444'}40;border-radius:14px;padding:14px;margin-bottom:14px;text-align:center;">
            <div style="font-size:30px;margin-bottom:4px;">${panelState.score>=14?'🏆':panelState.score>=10?'👍':'📚'}</div>
            <div style="font-weight:800;font-size:22px;color:${panelState.score>=14?'#22C55E':panelState.score>=10?'#F59E0B':'#EF4444'};">${panelState.score} / 20</div>
            <div style="color:${T.CSUB};margin-top:4px;font-size:13px;">${panelState.score>=14?'शानदार! 🔥':panelState.score>=10?'अच्छा! और practice करो 💪':'और मेहनत करो 📖'}</div>
            <button onclick="resetPanelQuiz('${expKey}')" style="margin-top:10px;padding:7px 18px;border-radius:9px;border:none;background:${color};color:#fff;font-weight:700;font-size:12px;">🔄 फिर से दो</button>
          </div>`:''}
        ${content.pyqs.map((q,qi)=>{
          const sel=panelState.ans[qi];
          const isCo=panelState.submitted&&sel===q.ans;
          const isWrong=panelState.submitted&&sel&&sel!==q.ans;
          return `<div style="background:${T.CARD};border:${panelState.submitted?(isCo?'1.5px solid #22C55E40':isWrong?'1.5px solid #EF444440':T.BDR):T.BDR};border-radius:12px;padding:14px;margin-bottom:10px;">
            <div style="font-weight:700;font-size:13px;color:${T.C};margin-bottom:9px;line-height:1.5;"><span style="color:${color};font-weight:800;">Q${qi+1}. </span>${q.q}</div>
            <div style="display:flex;flex-direction:column;gap:6px;">
              ${q.opts.map(opt=>{
                const letter=opt[0];
                const isSel=sel===letter;
                const isCO=letter===q.ans;
                let bg='transparent',bdr=T.BDR,tc=T.C;
                if(panelState.submitted){if(isCO){bg='rgba(34,197,94,.12)';bdr='1px solid #22C55E50';tc='#22C55E';}else if(isSel){bg='rgba(239,68,68,.1)';bdr='1px solid #EF444440';tc='#EF4444';}}
                else if(isSel){bg=color+'18';bdr=`1.5px solid ${color}60`;tc=color;}
                return `<button class="opt-btn" onclick="selectPanelAns('${expKey}',${qi},'${letter}')" style="border:${bdr};background:${bg};cursor:${panelState.submitted?'default':'pointer'};">
                  <span style="font-weight:800;color:${tc};flex-shrink:0;font-size:12px;">${letter})</span>
                  <span style="font-size:12px;color:${tc};line-height:1.4;">${opt.slice(3)}</span>
                  ${panelState.submitted&&isCO?'<span style="margin-left:auto;flex-shrink:0;font-size:12px;">✅</span>':''}
                  ${panelState.submitted&&isSel&&!isCO?'<span style="margin-left:auto;flex-shrink:0;font-size:12px;">❌</span>':''}
                </button>`;
              }).join('')}
            </div>
            ${panelState.submitted&&q.exp?`<div style="margin-top:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:9px;padding:8px 10px;">
              <span style="font-weight:700;color:#F59E0B;font-size:11px;">💡 </span>
              <span style="font-size:11px;color:${T.C};">${q.exp}</span>
            </div>`:''}
          </div>`;
        }).join('')}
        ${!panelState.submitted?`<button onclick="submitPanelQuiz('${expKey}')" ${Object.keys(panelState.ans).length===0?'disabled':''} style="width:100%;padding:12px;border-radius:12px;border:none;background:${color};color:#fff;font-weight:800;font-size:14px;margin-top:4px;opacity:${Object.keys(panelState.ans).length===0?.5:1};">✅ Submit (${Object.keys(panelState.ans).length}/20)</button>`:''}
      `}
    </div>`;
}

// ════ RAJ GK ════
function renderRajGK(T) {
  const gk = state.rajGK;
  const sec = RAJ_GK_SECTIONS[gk.activeSection];
  const q = gk.showAll&&gk.allQidx!==null ? sec.questions[gk.allQidx] : sec.questions[gk.qIdx];

  const optColor = (opt) => {
    if(!gk.selected) return {bg:'transparent',border:T.BDR,color:T.C};
    const isCorrect=opt.startsWith(q.ans);
    const isSelected=opt===gk.selected;
    if(isCorrect) return {bg:'rgba(34,197,94,0.18)',border:'1.5px solid #22C55E',color:'#22C55E'};
    if(isSelected&&!isCorrect) return {bg:'rgba(239,68,68,0.15)',border:'1.5px solid #EF4444',color:'#EF4444'};
    return {bg:'transparent',border:T.BDR,color:T.CSUB};
  };

  return `
    <div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        ${RAJ_GK_SECTIONS.map((s,i)=>`<button onclick="setRajGKSection(${i})" style="flex:1;min-width:100px;padding:10px 8px;border-radius:13px;border:${gk.activeSection===i?`2px solid ${s.color}`:T.BDR};background:${gk.activeSection===i?s.color+'22':'transparent'};color:${gk.activeSection===i?s.color:T.CSUB};font-weight:800;font-size:12px;">${s.emoji} ${s.title}</button>`).join('')}
      </div>
      <div style="background:${T.CARD};border:${T.BDR};border-radius:16px;padding:14px 18px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-weight:800;font-size:16px;color:${sec.color};">${sec.emoji} ${sec.title}</div>
            <div style="font-size:12px;color:${T.CSUB};margin-top:2px;">${sec.desc} • ${sec.questions.length} PYQs</div>
          </div>
          <div style="display:flex;gap:8px;">
            <button onclick="startRajGKQuiz()" style="padding:8px 16px;border-radius:11px;border:none;background:${sec.color};color:#fff;font-weight:800;font-size:12px;">🎯 Quiz Mode</button>
            <button onclick="showAllRajGK()" style="padding:8px 16px;border-radius:11px;border:${T.BDR};background:transparent;color:${T.CSUB};font-weight:700;font-size:12px;">📋 All Q's</button>
          </div>
        </div>
        ${gk.quizMode&&!gk.finished?`<div style="margin-top:10px;display:flex;gap:10px;align-items:center;">
          <div style="flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,0.1);">
            <div style="height:6px;border-radius:99px;background:${sec.color};width:${(gk.qIdx/sec.questions.length)*100}%;transition:width .4s;"></div>
          </div>
          <span style="font-size:11px;color:${T.CSUB};white-space:nowrap;">${gk.qIdx+1}/${sec.questions.length}</span>
          <span style="font-size:12px;font-weight:700;color:#22C55E;">✅ ${gk.score}</span>
        </div>`:''}
      </div>
      ${gk.finished?`
        <div style="background:${T.CARD};border:${T.BDR};border-radius:18px;padding:28px;text-align:center;">
          <div style="font-size:48px;margin-bottom:10px;">${gk.score>=sec.questions.length*.8?'🏆':gk.score>=sec.questions.length*.5?'👍':'📚'}</div>
          <div style="font-weight:800;font-size:22px;color:${sec.color};margin-bottom:6px;">Quiz Complete!</div>
          <div style="font-size:32px;font-weight:900;color:${T.C};margin-bottom:4px;">${gk.score}/${sec.questions.length}</div>
          <div style="font-size:14px;color:${T.CSUB};margin-bottom:18px;">${Math.round((gk.score/sec.questions.length)*100)}% सही</div>
          <button onclick="resetRajGKSection(${gk.activeSection})" style="padding:11px 28px;border-radius:13px;border:none;background:${sec.color};color:#fff;font-weight:800;font-size:14px;">🔄 फिर से</button>
        </div>`:''
      }
      ${gk.showAll&&gk.allQidx!==null&&!gk.finished?`
        <div>
          <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;">
            ${sec.questions.map((_,i)=>`<button onclick="setRajGKAllQ(${i})" style="min-width:32px;height:32px;border-radius:8px;border:${i===gk.allQidx?`2px solid ${sec.color}`:T.BDR};background:${i===gk.allQidx?sec.color+'33':'transparent'};color:${i===gk.allQidx?sec.color:T.CSUB};font-weight:700;font-size:11px;">${i+1}</button>`).join('')}
          </div>
          ${renderQCard(q, gk.selected, optColor, sec.color, T, gk.allQidx, sec.questions.length)}
          <div style="display:flex;gap:10px;margin-top:14px;">
            <button onclick="prevRajGKQ()" ${gk.allQidx===0?'disabled':''} style="flex:1;padding:11px 0;border-radius:12px;border:${T.BDR};background:transparent;color:${T.CSUB};font-weight:700;opacity:${gk.allQidx===0?.4:1};">← Prev</button>
            <button onclick="nextRajGKQ()" ${gk.allQidx===sec.questions.length-1?'disabled':''} style="flex:1;padding:11px 0;border-radius:12px;border:none;background:${sec.color};color:#fff;font-weight:800;opacity:${gk.allQidx===sec.questions.length-1?.4:1};">Next →</button>
          </div>
        </div>`:''}
      ${gk.quizMode&&!gk.finished&&!gk.showAll?`
        <div>
          ${renderQCard(q, gk.selected, optColor, sec.color, T, gk.qIdx, sec.questions.length)}
          ${gk.selected?`<button onclick="nextRajGKQuizQ()" style="width:100%;margin-top:14px;padding:13px 0;border-radius:14px;border:none;background:${sec.color};color:#fff;font-weight:800;font-size:15px;">${gk.qIdx+1<sec.questions.length?'Next Question →':'🏁 Finish Quiz'}</button>`:''}
        </div>`:''}
      ${!gk.quizMode&&!gk.showAll&&!gk.finished?`
        <div style="background:${T.CARD};border:1.5px solid ${sec.color}44;border-radius:16px;padding:20px;text-align:center;">
          <div style="font-size:38px;margin-bottom:8px;">${sec.emoji}</div>
          <div style="font-weight:800;font-size:16px;color:${T.C};margin-bottom:6px;">${sec.questions.length} Previous Year Questions</div>
          <div style="font-size:13px;color:${T.CSUB};margin-bottom:18px;">Quiz Mode में questions आएंगे। All Q's में सभी browse करें।</div>
          <div style="display:flex;gap:10px;">
            <button onclick="startRajGKQuiz()" style="flex:1;padding:12px 0;border-radius:13px;border:none;background:${sec.color};color:#fff;font-weight:800;font-size:14px;">🎯 Quiz Start करें</button>
            <button onclick="showAllRajGK()" style="flex:1;padding:12px 0;border-radius:13px;border:1.5px solid ${sec.color};background:transparent;color:${sec.color};font-weight:800;font-size:14px;">📋 सभी देखें</button>
          </div>
        </div>`:''}
    </div>`;
}

function renderQCard(q, selected, optColor, secColor, T, idx, total) {
  return `<div style="background:${T.CARD};border:${T.BDR};border-radius:18px;padding:20px 18px;">
    <div style="font-size:11px;color:${T.CSUB};margin-bottom:8px;font-weight:600;">Q${idx+1} of ${total}</div>
    <div style="font-weight:700;font-size:15px;color:${T.C};margin-bottom:16px;line-height:1.6;">${q.q}</div>
    <div style="display:flex;flex-direction:column;gap:9px;">
      ${q.opts.map(opt=>{
        const st=optColor(opt);
        return `<button onclick="answerRajGK('${opt.replace(/'/g,"\\'")}',${idx})" style="padding:11px 14px;border-radius:12px;border:${st.border};background:${st.bg};color:${st.color};font-weight:600;font-size:13px;text-align:left;cursor:${selected?'default':'pointer'};transition:all .15s;">${opt}</button>`;
      }).join('')}
    </div>
    ${selected?`<div style="margin-top:14px;padding:12px 14px;border-radius:12px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);">
      <span style="font-weight:700;font-size:12px;color:${secColor};">💡 Explanation: </span>
      <span style="font-size:13px;color:${T.C};">${q.exp}</span>
    </div>`:''}
  </div>`;
}

// ════ NOTES ════
function renderNotes(T) {
  const IB=`width:100%;padding:10px 14px;border-radius:12px;border:${T.BDR};background:${T.INBG};color:${T.C};font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;`;
  const filtered = state.notes
    .filter(n=>!state.noteSearch || n.title.toLowerCase().includes((state.noteSearch||'').toLowerCase())||n.body.toLowerCase().includes((state.noteSearch||'').toLowerCase()))
    .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const editing = state._editingNote;
  return `
    <div>
      <div style="background:${T.CARD};border:${T.BDR};border-radius:20px;padding:20px;margin-bottom:20px;">
        <div style="font-weight:800;font-size:16px;color:${T.C};margin-bottom:14px;">${editing!==undefined?'✏️ Edit Note':'📝 New Note'}</div>
        <input id="noteTitle" value="${editing!==undefined?(state.notes[editing]?.title||''):(state._noteTitle||'')}" placeholder="Title..." style="${IB}margin-bottom:10px;">
        <textarea id="noteBody" rows="4" placeholder="Notes, formulas, concepts..." style="${IB}resize:vertical;margin-bottom:12px;">${editing!==undefined?(state.notes[editing]?.body||''):(state._noteBody||'')}</textarea>
        <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;">
          ${Object.entries(TAG_COLORS).map(([t,col])=>`<button onclick="setNoteTag('${t}')" style="padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:${(state._noteTag||'📌 Important')===t?`2px solid ${col}`:'2px solid transparent'};background:${(state._noteTag||'📌 Important')===t?col+'22':(state.dark?'rgba(255,255,255,0.07)':'#f0f0f0')};color:${(state._noteTag||'📌 Important')===t?col:T.CSUB};">${t}</button>`).join('')}
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="saveNote()" style="flex:1;padding:11px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:800;font-size:14px;">${editing!==undefined?'💾 Update':'➕ Save'}</button>
          ${editing!==undefined?`<button onclick="cancelEditNote()" style="padding:11px 16px;border-radius:12px;border:${T.BDR};background:transparent;color:${T.CSUB};font-weight:700;">Cancel</button>`:''}

function renderProgress(T, stats) {

          <div style="background:${T.CARD};border:${T.BDR};border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;">

// EVENT HANDLERS (window.*)

window.toggleDark = function() { state.dark=!state.dark; render(); };
window.setTab = function(t) { state.tab=t; render(); };
window.setActiveSub = function(i) { state.activeSub=i; render(); };
window.setSyllabusSearch = function(v) { state.search=v; state.activeSub=null; render(); };

window.doToggleTopic = function(day, ti) {
  const key=`${day}-${ti}`;
  const np={...state.progress,[key]:!state.progress[key]};
  const allDays=getAllDays();
  const d=allDays.find(x=>x.day===day);
  const wasComplete=d&&d.topics.every((_,i)=>state.progress[`${day}-${i}`]);
  state.progress=np;
  const isNowComplete=d&&d.topics.every((_,i)=>np[`${day}-${i}`]);
  if(isNowComplete&&!wasComplete) showCelebration(day);
  render();
};

window.toggleExpand = function(expKey) {
  state.expandedDay = state.expandedDay===expKey?null:expKey;
  render();
};

window.setPanelTab = function(expKey,tab) {
  if(!state.studyPanels[expKey]) state.studyPanels[expKey]={tab:'overview',ans:{},submitted:false,score:0};
  state.studyPanels[expKey].tab=tab;
  render();
};

window.selectPanelAns = function(expKey,qi,letter) {
  if(!state.studyPanels[expKey]) state.studyPanels[expKey]={tab:'pyqs',ans:{},submitted:false,score:0};
  if(state.studyPanels[expKey].submitted) return;
  state.studyPanels[expKey].ans[qi]=letter;
  render();
};

window.submitPanelQuiz = function(expKey) {
  const panel=state.studyPanels[expKey]||{ans:{}};
  const expKeyParts=expKey.split('_');
  const day=parseInt(expKeyParts[expKeyParts.length-1]);
  const subj=state.syllabus.find(s=>s.days.some(d=>d.day===day));
  const d=subj?.days.find(dd=>dd.day===day);
  const content=getContentForDay(day,d?.topics||[]);
  let s=0;
  content.pyqs.forEach((q,i)=>{if(panel.ans[i]===q.ans)s++;});
  state.studyPanels[expKey]={...panel,submitted:true,score:s};
  render();
};

window.resetPanelQuiz = function(expKey) {
  state.studyPanels[expKey]={tab:'pyqs',ans:{},submitted:false,score:0};
  render();
};

// Raj GK events
window.setRajGKSection = function(i) {
  state.rajGK={activeSection:i,qIdx:0,selected:null,score:0,answered:0,quizMode:false,finished:false,showAll:false,allQidx:null};
  render();
};
window.resetRajGKSection = function(i) { window.setRajGKSection(i); };
window.startRajGKQuiz = function() {
  state.rajGK={...state.rajGK,quizMode:true,qIdx:0,selected:null,score:0,answered:0,finished:false,showAll:false};
  render();
};
window.showAllRajGK = function() {
  state.rajGK={...state.rajGK,showAll:true,allQidx:0,quizMode:false,selected:null};
  render();
};
window.answerRajGK = function(opt,idx) {
  if(state.rajGK.selected) return;
  const sec=RAJ_GK_SECTIONS[state.rajGK.activeSection];
  const q=state.rajGK.showAll?sec.questions[state.rajGK.allQidx]:sec.questions[state.rajGK.qIdx];
  const correct=opt.startsWith(q.ans);
  state.rajGK={...state.rajGK,selected:opt,answered:state.rajGK.answered+1,score:state.rajGK.score+(correct?1:0)};
  render();
};
window.nextRajGKQuizQ = function() {
  const sec=RAJ_GK_SECTIONS[state.rajGK.activeSection];
  const nextIdx=state.rajGK.qIdx+1;
  if(nextIdx>=sec.questions.length){state.rajGK={...state.rajGK,finished:true};render();return;}
  state.rajGK={...state.rajGK,qIdx:nextIdx,selected:null};
  render();
};
window.setRajGKAllQ = function(i) {
  state.rajGK={...state.rajGK,allQidx:i,selected:null};
  render();
};
window.prevRajGKQ = function() {
  if(state.rajGK.allQidx>0) state.rajGK={...state.rajGK,allQidx:state.rajGK.allQidx-1,selected:null};
  render();
};
window.nextRajGKQ = function() {
  const sec=RAJ_GK_SECTIONS[state.rajGK.activeSection];
  if(state.rajGK.allQidx<sec.questions.length-1) state.rajGK={...state.rajGK,allQidx:state.rajGK.allQidx+1,selected:null};
  render();
};

// Notes events
window.setNoteTag = function(t) { state._noteTag=t; render(); };
window.setNoteSearch = function(v) { state.noteSearch=v; render(); };
window.saveNote = function() {
  const title=document.getElementById('noteTitle')?.value||'';
  const body=document.getElementById('noteBody')?.value||'';
  if(!body.trim()) return;
  const tag=state._noteTag||'📌 Important';
  const editing=state._editingNote;
  if(editing!==undefined) {
    state.notes=state.notes.map((n,i)=>i===editing?{...n,title:title||'Untitled',body,tag}:n);
    state._editingNote=undefined;
  } else {
    state.notes=[{id:Date.now(),title:title||'Untitled',body,tag,date:new Date().toLocaleDateString('en-IN'),pinned:false},...state.notes];
  }
  state._noteTitle=''; state._noteBody=''; state._noteTag='📌 Important';
  render();
};
window.cancelEditNote = function() { state._editingNote=undefined; render(); };
window.editNote = function(i) { state._editingNote=i; state._noteTag=state.notes[i]?.tag||'📌 Important'; render(); };
window.deleteNote = function(i) { state.notes=state.notes.filter((_,j)=>j!==i); render(); };
window.pinNote = function(i) { state.notes=state.notes.map((n,j)=>j===i?{...n,pinned:!n.pinned}:n); render(); };

// Profile events
window.toggleProfileEdit = function() { state._editingProfile=!state._editingProfile; state._profileMsg=''; render(); };
window.setProfileAvatar = function(id) { state._profileAvatar=id; render(); };
window.saveProfile = function() {
  const name=document.getElementById('profileName')?.value||state.user.name;
  const goal=document.getElementById('profileGoal')?.value||'';
  state.user={...state.user,name,goal,avatarId:state._profileAvatar||state.user.avatarId};
  state._editingProfile=false;
  state._profileMsg='✅ Updated!';
  setTimeout(()=>{state._profileMsg='';render();},2500);
  render();
};
window.doLogout = function() { state.user=null; state.tab='dashboard'; render(); };

// Add subject/day modal events
window.setAddSubEmoji = function(e) { state._addSubEmoji=e; showAddSubjectModal(); };
window.setAddSubColor = function(c) { state._addSubColor=c; showAddSubjectModal(); };
window.doAddSubject = function() {
  const name=document.getElementById('addSubName')?.value||'';
  if(!name.trim()){document.getElementById('addSubErr').style.display='block';document.getElementById('addSubErr').textContent='⚠️ Naam ज़रूरी है।';return;}
  state.syllabus=[...state.syllabus,{id:`s_${Date.now()}`,subject:name.trim(),emoji:state._addSubEmoji||'📚',color:state._addSubColor||'#6366F1',days:[]}];
  closeModal(); render();
};
window.addTopicField = function() {
  state._addDayTopics=[...(state._addDayTopics||['']),'']; 
  const T=getTheme();
  document.getElementById('topicsContainer').innerHTML=renderTopicFields(T);
};
window.removeTopicField = function(i) {
  state._addDayTopics=(state._addDayTopics||['']).filter((_,j)=>j!==i);
  const T=getTheme();
  document.getElementById('topicsContainer').innerHTML=renderTopicFields(T);
};
window.updateTopicField = function(i,v) {
  if(!state._addDayTopics) state._addDayTopics=[''];
  state._addDayTopics[i]=v;
};
window.doAddDay = function() {
  const dayNum=parseInt(document.getElementById('addDayNum')?.value||1);
  const topics=(state._addDayTopics||[]).filter(t=>t.trim());
  const errEl=document.getElementById('addDayErr');
  if(!topics.length){errEl.style.display='block';errEl.textContent='⚠️ कम से कम एक topic ज़रूरी है।';return;}
  if(state.syllabus.flatMap(s=>s.days.map(d=>d.day)).includes(dayNum)){errEl.style.display='block';errEl.textContent=`⚠️ Day ${dayNum} already exists.`;return;}
  const sid=state._addDaySubId;
  state.syllabus=state.syllabus.map(s=>s.id===sid?{...s,days:[...s.days,{day:dayNum,topics}].sort((a,b)=>a.day-b.day)}:s);
  state._addDayTopics=null;
  closeModal(); render();
};
window.saveNotesModal = function(key) {
  const text=document.getElementById('notesModalText')?.value||'';
  state.dayContent={...state.dayContent,[key]:text};
  closeModal(); render();
};

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
function attachMainEvents() {
  // Nothing extra needed — all handlers are on window.*
}

// Start the app
render();
</script>
